name: Engine Predictor Maintenance Pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

env:
  MLFLOW_TRACKING_URI: http://127.0.0.1:5000
  ARTIFACT_STORE: ${{ github.workspace }}/mlartifacts

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Dependencies
        run: pip install -r predictive_maintenance_project/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive_maintenance_project/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Dependencies
        run: pip install -r predictive_maintenance_project/requirements.txt
      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive_maintenance_project/model_building/preparation.py


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r predictive_maintenance_project/requirements.txt
      - name: Launch MLflow server on port 5000
        run: |
          mkdir -p ${{ env.ARTIFACT_STORE }}
          nohup mlflow server \
            --host 127.0.0.1 \
            --port 5000 \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ${{ env.ARTIFACT_STORE }} \
            > mlflow.log 2>&1 &
      - name: Wait until MLflow is healthy
        run: |
          timeout 60 bash -c \
            'until curl -sf http://127.0.0.1:5000/health; do sleep 2; done'
          echo "MLflow server is ready."
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000
        run: |
          cd predictive_maintenance_project/model_building
          python train.py
      - name: Archive MLflow experiment data
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mlflow-experiment-data
          path: |
            mlflow.db
            ${{ env.ARTIFACT_STORE }}
          retention-days: 30

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-training,data-prep,register-dataset]
    steps:
      - uses: actions/checkout@v5
      - name: Install Dependencies
        run: pip install -r predictive_maintenance_project/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python predictive_maintenance_project/hosting/hosting.py
